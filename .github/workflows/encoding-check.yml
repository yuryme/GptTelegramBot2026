name: Encoding Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  encoding-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: UTF-8 decode check
        run: python scripts/check_encoding.py --check --check-type utf8
      - name: No BOM check
        run: python scripts/check_encoding.py --check --check-type bom
      - name: Mojibake check
        run: python scripts/check_encoding.py --check --check-type mojibake
